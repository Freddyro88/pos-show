<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>POS Show</title>
  <base href="/">

  <!-- ─── VIEWPORT ─────────────────────────────── -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

  <!-- ─── PWA / IPAD KIOSK ─────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="POS Show">

  <!-- ─── THEME COLOR ──────────────────────────── -->
  <meta name="theme-color" content="#0f0f1a">

  <!-- ─── PREVENT COPY / SELECTION ────────────── -->
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    /* Prevent iOS rubber-band scroll */
    html, body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* Safe area padding for iPad notch/home bar */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    app-root {
      display: block;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Kiosk: hide address bar when launched as PWA */
    @media (display-mode: standalone) {
      html, body { overflow: hidden; }
      app-root { height: 100vh; }
    }
  </style>

  <!-- Kiosk fullscreen script: scroll past browser chrome on load -->
  <script>
    window.addEventListener('load', () => {
      if (window.navigator.standalone !== true &&
          !window.matchMedia('(display-mode: standalone)').matches) {
        setTimeout(() => window.scrollTo(0, 1), 300);
      }
    });
  </script>

  <!-- ─── ICONS ────────────────────────────────── -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- iPad splash screens (generados por Cristian) -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
